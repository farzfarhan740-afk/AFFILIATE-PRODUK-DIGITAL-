<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate Produk Digital</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
}

.container {
  max-width:400px;
  margin:auto;
  padding:20px;
}

.btn {
  display:block;
  background:linear-gradient(45deg,#ff0050,#ff7a00);
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

.page {
  display:none;
}

.active {
  display:block;
}

.back {
  margin-top:20px;
  display:block;
  color:#ff7a00;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="container active">
  <h1>🔥 Affiliate Produk Digital</h1>
  <p>Pilih produk terbaik</p>

  <a class="btn" onclick="showPage('ebook')">📦 Ebook</a>
  <a class="btn" onclick="showPage('template')">🎥 Template</a>
  <a class="btn" onclick="showPage('tools')">🤖 Tools AI</a>
</div>

<!-- EBOOK -->
<div id="ebook" class="container page">
  <h1>📦 Ebook Cuan</h1>
  <p>Belajar sampai bisa hasil uang</p>

  <a class="btn" href="https://shopee.co.id/" target="_blank">
    🔥 Beli Sekarang
  </a>

  <a class="back" onclick="showPage('home')">← Kembali</a>
</div>

<!-- TEMPLATE -->
<div id="template" class="container page">
  <h1>🎥 Template TikTok</h1>
  <p>Bikin konten auto FYP</p>

  <a class="btn" href="https://www.tiktok.com/" target="_blank">
    🔥 Lihat Produk
  </a>

  <a class="back" onclick="showPage('home')">← Kembali</a>
</div>

<!-- TOOLS -->
<div id="tools" class="container page">
  <h1>🤖 Tools AI</h1>
  <p>Kerja lebih cepat pakai AI</p>

  <a class="btn" href="#">
    🔥 Coba Sekarang
  </a>

  <a class="back" onclick="showPage('home')">← Kembali</a>
</div>

<script>
function showPage(page) {
  document.querySelectorAll('.container').forEach(el => {
    el.classList.remove('active');
  });
  document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
